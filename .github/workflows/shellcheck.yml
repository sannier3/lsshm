name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Build the single-file script
        run: ./scripts/build.sh

      # The modules in src/ share state and are only complete once assembled,
      # so the assembled script is the authoritative lint target.
      - name: ShellCheck assembled script
        run: shellcheck -S warning lsshm.sh

      - name: ShellCheck helper scripts and tests
        run: shellcheck -S warning scripts/build.sh install.sh tests/run.sh tests/test_*.sh
