name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure OpenSSH client tools
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Build the single-file script
        run: ./scripts/build.sh

      - name: Syntax check assembled script
        run: bash -n lsshm.sh

      - name: Verify SHA256SUMS is up to date
        run: |
          sha256sum -c SHA256SUMS

      - name: Run unit tests
        run: ./tests/run.sh

      - name: Smoke test commands
        run: |
          bash lsshm.sh version
          bash lsshm.sh help >/dev/null
